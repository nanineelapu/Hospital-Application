apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: hospital-eks
  region: ap-south-1        # Mumbai. Change if required.
  version: "1.30"

iam:
  withOIDC: true            # needed for the EBS CSI driver IAM role

managedNodeGroups:
  - name: ng-workers
    instanceType: t3.medium
    desiredCapacity: 2       # HA: 2 worker nodes
    minSize: 2
    maxSize: 3
    volumeSize: 20

addons:
  - name: aws-ebs-csi-driver   # real persistent storage (Phase 8); auto-creates IAM role
    wellKnownPolicies:
      ebsCSIController: true
